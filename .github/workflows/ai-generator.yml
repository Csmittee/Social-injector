name: AI Post Generator

on:
  workflow_dispatch:
    inputs:
      business_id:
        description: "Business"
        required: true
        type: choice
        options:
          - iflex
          - janisflow
          - daje
          - outride
      prompt:
        description: "Content brief / prompt for AI"
        required: true
      count:
        description: "Number of posts"
        required: true
        default: "5"
        type: choice
        options:
          - "3"
          - "5"
          - "7"
          - "10"
      platforms:
        description: "Platforms (comma-separated)"
        required: true
        default: "Facebook,Instagram"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUSINESS_ID: ${{ github.event.inputs.business_id }}
          PROMPT:      ${{ github.event.inputs.prompt }}
          COUNT:       ${{ github.event.inputs.count }}
          PLATFORMS:   ${{ github.event.inputs.platforms }}
        run: python scripts/ai_generator.py

      - name: Commit new posts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add social/posts.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: [${{ github.event.inputs.business_id }}] AI generated ${{ github.event.inputs.count }} post(s)"
            git push origin main
          fi
