name: Content Factory - AI Generator

on:
  schedule:
    - cron: '0 2 * * *'  # Runs daily at 2 AM
  workflow_dispatch:      # Manual trigger
    inputs:
      theme:
        description: '📝 Theme/Topic (anything you want)'
        required: true
        default: 'fitness motivation'
        type: string
      count:
        description: '🔢 Number of posts'
        required: false
        default: '5'
        type: choice
        options:
          - '3'
          - '5'
          - '10'
          - '14'
      platforms:
        description: '📱 Platforms'
        required: false
        default: 'facebook,instagram'
        type: string

jobs:
  create-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests pandas
      
      - name: Run AI Content Factory
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME: ${{ github.event.inputs.theme }}
          COUNT: ${{ github.event.inputs.count }}
          PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          python scripts/content_factory.py
      
      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/posts.csv
          git diff --cached --quiet || git commit -m "🤖 AI generated: ${{ github.event.inputs.theme }} [skip ci]"
          git push
