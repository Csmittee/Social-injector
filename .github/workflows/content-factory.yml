name: Content Factory - Daily Automation

on:
  schedule:
    - cron: '0 2 * * *'  # Runs daily at 2 AM
  workflow_dispatch:      # Manual trigger for testing
    inputs:
      theme:
        description: 'Content theme'
        required: false
        default: 'general'
        type: string
      count:
        description: 'Number of posts'
        required: false
        default: '5'
        type: string
      platforms:
        description: 'Platforms (comma separated)'
        required: false
        default: 'facebook,instagram'
        type: string

jobs:
  create-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests pandas
      
      - name: Run Content Factory
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME: ${{ github.event.inputs.theme || 'general' }}
          COUNT: ${{ github.event.inputs.count || '5' }}
          PLATFORMS: ${{ github.event.inputs.platforms || 'facebook,instagram' }}
        run: |
          python scripts/content_factory.py
      
      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/posts.csv
          git add social/ai_generated/
          git diff --cached --quiet || git commit -m "Auto-generate daily content [skip ci]"
          git push
