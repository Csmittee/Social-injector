name: Content Factory - AI Generator

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: '📝 Theme/Topic'
        required: true
        default: 'fitness motivation'
        type: string
      count:
        description: '🔢 Number of posts'
        required: false
        default: '5'
        type: choice
        options:
          - '3'
          - '5'
          - '10'
          - '14'
      platforms:
        description: '📱 Platforms'
        required: false
        default: 'facebook,instagram'
        type: string

jobs:
  create-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests pandas
      
      - name: Run AI Content Factory
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME: ${{ github.event.inputs.theme }}
          COUNT: ${{ github.event.inputs.count }}
          PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          python scripts/content_factory.py
      
      - name: Commit and Push with Conflict Resolution
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes first
          git pull --rebase origin main || true
          
          # Add the changed file
          git add social/posts.csv
          
          # Commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 AI generated: ${{ github.event.inputs.theme }}"
            # Try to push, if fails, pull and retry once
            git push origin main || (git pull --rebase origin main && git push origin main)
          fi
