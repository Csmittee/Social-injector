name: Image Generator

on:
  workflow_dispatch:
    inputs:
      titles:
        description: 'Post titles to generate images for (|| separated)'
        required: true

jobs:
  generate-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build prompts (Claude) → Generate images (Replicate) → Upload (Cloudinary)
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN:    ${{ secrets.REPLICATE_API_TOKEN }}
          CLOUDINARY_CLOUD_NAME:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:     ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:  ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          python scripts/image_generator.py \
            --titles "${{ github.event.inputs.titles }}"

      - name: Commit updated CSV (race-safe)
        run: |
          bash scripts/safe_push.sh "feat: images generated → post_queue"
