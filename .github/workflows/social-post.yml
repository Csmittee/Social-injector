name: Social Poster (Dry Run Mode)

on:
  # === TURN ON/OFF HERE ===
  # Option A: Manual only (Recommended during dry-run)
  workflow_dispatch:
  
  # Option B: Schedule (Uncomment only when you want it to run automatically)
  # schedule:
  #   - cron: '0 8 * * *'     # Once per day at 8:00 AM (Thailand time)
  #   - cron: '*/30 * * * *'  # Every 30 minutes (for testing)

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Social Poster (Dry Run)
        run: python scripts/social_poster.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add social/posts.csv
          
          if git diff --cached --quiet; then
            echo "No changes to commit - Dry run completed."
          else
            git commit -m "Social Poster: Update status [dry-run] [skip ci]"
            git push
          fi
