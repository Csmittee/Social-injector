name: Update CSV Status

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Post title'
        required: true
        type: string
      status:
        description: 'New status'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.csmittee_token }}
      
      - name: Update status in CSV
        env:
          TITLE: ${{ github.event.inputs.title }}
          NEW_STATUS: ${{ github.event.inputs.status }}
        run: |
          python3 << 'EOF'
          import csv
          
          title = "${{ env.TITLE }}"
          new_status = "${{ env.NEW_STATUS }}"
          
          # Read CSV
          rows = []
          with open('social/posts.csv', 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  if row.get('title') == title:
                      row['status'] = new_status
                  rows.append(row)
          
          # Write back
          with open('social/posts.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=['title', 'post_date', 'platform', 'caption', 'image_urls', 'link', 'status'])
              writer.writeheader()
              writer.writerows(rows)
          
          print(f"Updated {title} to {new_status}")
          EOF
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/posts.csv
          git diff --cached --quiet || git commit -m "Update status: ${{ github.event.inputs.title }}"
          git push
