name: Update Post Status

on:
  workflow_dispatch:
    inputs:
      changes:
        description: 'Format: "Title 1::approved||Title 2::rejected"'
        required: true

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update CSV statuses
        run: |
          python scripts/update_status.py \
            --changes "${{ github.event.inputs.changes }}"

      - name: Commit updated CSV (race-safe)
        run: |
          bash scripts/safe_push.sh "chore: batch status update"
