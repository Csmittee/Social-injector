<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Control Room | Social Injector</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
    .container { max-width: 900px; margin: auto; background: white; padding: 28px; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }

    .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #eee; flex-wrap: wrap; gap: 10px; }
    .nav h1 { margin: 0; font-size: 22px; }

    /* Token section */
    #tokenSection { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 14px 18px; margin-bottom: 22px; }
    #tokenSection.ok { background: #d4edda; border-color: #28a745; }
    #tokenSection label { font-weight: 600; color: #856404; display: block; margin-bottom: 8px; }
    #tokenSection.ok label { color: #155724; }
    .token-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    #tokenInput { flex: 1; min-width: 220px; padding: 9px 12px; border: 1px solid #ffc107; border-radius: 6px; font-size: 14px; font-family: monospace; }
    #tokenSection.ok #tokenInput { border-color: #28a745; background: #f0fff4; }
    #tokenSaveBtn { background: #ffc107; color: #333; border: none; border-radius: 6px; padding: 9px 18px; font-weight: bold; cursor: pointer; white-space: nowrap; }
    #tokenSaveBtn:hover { background: #e0a800; }
    #tokenNote { font-size: 12px; color: #666; margin-top: 6px; }

    .form-group { margin-bottom: 20px; }
    label.field-label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 15px; }
    textarea, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; font-family: inherit; transition: border-color 0.2s; }
    textarea:focus, select:focus { outline: none; border-color: #6f42c1; }
    textarea { min-height: 160px; resize: vertical; }

    .platforms { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 4px; }
    .platforms label { display: flex; align-items: center; gap: 8px; font-size: 15px; cursor: pointer; }
    .platforms input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }

    .btn { padding: 10px 22px; margin: 4px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-back    { background: #6f42c1; color: white; }
    .btn-refresh { background: #17a2b8; color: white; }
    .btn-generate { background: #28a745; color: white; padding: 14px 32px; font-size: 17px; width: 100%; margin-top: 8px; border-radius: 8px; }

    .status-box { margin-top: 18px; padding: 14px 18px; border-radius: 8px; display: none; font-size: 15px; line-height: 1.6; }
    .status-box.success { background: #d4edda; color: #155724; display: block; }
    .status-box.error   { background: #f8d7da; color: #721c24; display: block; }
    .status-box.info    { background: #cce5ff; color: #004085; display: block; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint { font-size: 12px; color: #888; margin-top: 5px; }
  </style>
</head>
<body>
<div class="container">

  <div class="nav">
    <h1>🤖 AI Control Room</h1>
    <div>
      <button onclick="window.location.href='dashboard.html'" class="btn btn-back">← Dashboard</button>
      <button onclick="location.reload()" class="btn btn-refresh">🔄 Refresh</button>
    </div>
  </div>

  <!-- Token Section -->
  <div id="tokenSection">
    <label>🔑 GitHub PAT Token (required to trigger AI generation)</label>
    <div class="token-row">
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
      <button id="tokenSaveBtn" onclick="saveToken()">Save Token</button>
    </div>
    <div id="tokenNote" class="hint">
      Token needs <strong>repo</strong> + <strong>actions:write</strong> scopes.
      It's only stored in your browser session — never sent anywhere except GitHub's API.
    </div>
  </div>

  <!-- Prompt -->
  <div class="form-group">
    <label class="field-label">Your Prompt / Guideline for AI</label>
    <textarea id="promptInput" placeholder="Example: Generate 5 motivational yoga posts for beginners in Thai + English, focus on morning routine, include a CTA to book a class..."></textarea>
    <div class="hint">Shift+Enter for new lines. Enter to generate.</div>
  </div>

  <!-- Count -->
  <div class="form-group">
    <label class="field-label">Number of Posts to Generate</label>
    <select id="countInput">
      <option value="3">3 posts</option>
      <option value="5" selected>5 posts</option>
      <option value="7">7 posts</option>
      <option value="10">10 posts</option>
    </select>
  </div>

  <!-- Platforms -->
  <div class="form-group">
    <label class="field-label">Platforms</label>
    <div class="platforms">
      <label><input type="checkbox" value="Facebook" checked> Facebook</label>
      <label><input type="checkbox" value="Instagram" checked> Instagram</label>
      <label><input type="checkbox" value="Line"> Line</label>
    </div>
  </div>

  <button id="generateBtn" class="btn btn-generate" onclick="generatePosts()">
    🚀 Generate Posts with AI
  </button>

  <div id="statusBox" class="status-box"></div>

</div>

<script>
  const REPO_OWNER   = "Csmittee";
  const REPO_NAME    = "social-injector";
  const WORKFLOW_AI  = "ai-generator.yml";  // must match your workflow filename

  // ── TOKEN ──────────────────────────────────────────────────────────────────
  function getToken() {
    return sessionStorage.getItem("gh_pat") || "";
  }

  function saveToken() {
    const val = document.getElementById("tokenInput").value.trim();
    if (!val) { showStatus("Please enter a token first.", "error"); return; }
    sessionStorage.setItem("gh_pat", val);
    document.getElementById("tokenSection").classList.add("ok");
    document.getElementById("tokenSection").querySelector("label").textContent = "✅ Token saved for this session";
    showStatus("Token saved. You can now generate posts.", "success");
  }

  function checkToken() {
    const t = getToken();
    if (t) {
      document.getElementById("tokenInput").value = t.slice(0, 4) + "••••••••••••";
      document.getElementById("tokenSection").classList.add("ok");
      document.getElementById("tokenSection").querySelector("label").textContent = "✅ Token loaded from session";
      document.getElementById("tokenSection").style.display = "none"; // ADD THIS
    }
  }
  // ── GENERATE ───────────────────────────────────────────────────────────────
  async function generatePosts() {
    const token = getToken();
    if (!token) {
      showStatus("❌ Please enter your GitHub PAT token first.", "error");
      return;
    }

    const prompt = document.getElementById("promptInput").value.trim();
    if (!prompt) {
      showStatus("❌ Please enter a prompt or guideline for the AI.", "error");
      return;
    }

    const count = document.getElementById("countInput").value;
    const platforms = Array.from(document.querySelectorAll(".platforms input:checked"))
      .map(cb => cb.value).join(",");

    if (!platforms) {
      showStatus("❌ Please select at least one platform.", "error");
      return;
    }

    // Disable button, show spinner
    const btn = document.getElementById("generateBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Sending to GitHub Actions...';
    showStatus("⏳ Triggering AI generation workflow... please wait.", "info");

    try {
      const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/${WORKFLOW_AI}/dispatches`;
      const res = await fetch(url, {
        method: "POST",
        headers: {
          "Accept": "application/vnd.github.v3+json",
          "Authorization": `Bearer ${token}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          ref: "main",
          inputs: {
            prompt:    prompt,
            count:     String(count),
            platforms: platforms
          }
        })
      });

      if (res.status === 204) {
        // SUCCESS — workflow was triggered
        showStatus(
          `✅ AI generation started! GitHub Actions will generate ${count} post(s) for [${platforms}] and append them to posts.csv.\n\n` +
          `⏱ This usually takes 30–60 seconds. Then go to the Dashboard and click Refresh to see the new pending posts.`,
          "success"
        );
        document.getElementById("promptInput").value = "";
      } else if (res.status === 401) {
        showStatus("❌ Invalid or expired GitHub token. Please re-enter your PAT.", "error");
        sessionStorage.removeItem("gh_pat");
        document.getElementById("tokenSection").classList.remove("ok");
      } else if (res.status === 404) {
        showStatus(`❌ Workflow '${WORKFLOW_AI}' not found. Make sure the file exists in .github/workflows/ and has 'workflow_dispatch' trigger with inputs: prompt, count, platforms.`, "error");
      } else if (res.status === 422) {
        showStatus("❌ Workflow inputs mismatch — check your workflow's 'inputs' section matches: prompt, count, platforms.", "error");
      } else {
        const body = await res.text();
        showStatus(`❌ GitHub API error ${res.status}: ${body}`, "error");
      }
    } catch (e) {
      showStatus(`❌ Network error: ${e.message}`, "error");
    } finally {
      btn.disabled = false;
      btn.innerHTML = "🚀 Generate Posts with AI";
    }
  }

  // ── UI HELPERS ──────────────────────────────────────────────────────────────
  function showStatus(msg, type) {
    const el = document.getElementById("statusBox");
    el.textContent = msg;
    el.className = `status-box ${type}`;
  }

  // Enter in textarea triggers generate (Shift+Enter = newline)
  document.getElementById("promptInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      generatePosts();
    }
  });

  // ── INIT ───────────────────────────────────────────────────────────────────
  checkToken();
</script>
</body>
</html>
