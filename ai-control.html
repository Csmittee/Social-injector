<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Control Room | Social Injector</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #f4f4f4; 
        }
        .container { 
            max-width: 900px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); 
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        .nav h1 {
            margin: 0;
            font-size: 24px;
        }
        .btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-back { background: #6f42c1; color: white; }
        .btn-refresh { background: #17a2b8; color: white; }
        .btn-generate { 
            background: #28a745; 
            color: white; 
            padding: 14px 32px; 
            font-size: 18px; 
            width: 100%;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        textarea {
            min-height: 180px;
            resize: vertical;
        }
        .platforms {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <div class="nav">
            <h1>🤖 AI Control Room</h1>
            <div>
                <button onclick="window.location.href='dashboard.html'" class="btn btn-back">
                    ← Back to Dashboard
                </button>
                <button onclick="refreshPage()" class="btn btn-refresh">
                    🔄 Refresh
                </button>
            </div>
        </div>

        <div class="form-group">
            <label>Your Custom Prompt / Guideline for AI</label>
            <textarea id="promptInput" placeholder="Example: Generate 5 motivational yoga posts for beginners in Thai + English, focus on morning routine, include CTA to book class..."></textarea>
        </div>

        <div class="form-group">
            <label>Number of Posts to Generate</label>
            <select id="countInput">
                <option value="3">3 posts</option>
                <option value="5" selected>5 posts</option>
                <option value="7">7 posts</option>
                <option value="10">10 posts</option>
            </select>
        </div>

        <div class="form-group">
            <label>Platforms</label>
            <div class="platforms">
                <label><input type="checkbox" value="Facebook" checked> Facebook</label>
                <label><input type="checkbox" value="Instagram" checked> Instagram</label>
                <label><input type="checkbox" value="Line"> Line</label>
            </div>
        </div>

        <button onclick="generatePosts()" class="btn btn-generate">
            🚀 Generate Posts with AI
        </button>

        <div id="status" class="status"></div>
    </div>

    <script>
        function showStatus(message, type = "success") {
            const statusEl = document.getElementById("status");
            statusEl.textContent = message;
            statusEl.className = `status status-${type}`;
            statusEl.style.display = "block";
            
            setTimeout(() => {
                statusEl.style.display = "none";
            }, 8000);
        }

        async function generatePosts() {
            const prompt = document.getElementById("promptInput").value.trim();
            const count = document.getElementById("countInput").value;
            
            if (!prompt) {
                showStatus("Please enter your prompt/guideline for the AI.", "error");
                return;
            }

            const platforms = Array.from(document.querySelectorAll('.platforms input:checked'))
                                  .map(cb => cb.value).join(", ");

            showStatus("🤖 Sending request to AI... Please wait.", "info");

            // TODO: Connect to your actual AI generation logic here later
            // For now, we simulate and show message
            setTimeout(() => {
                showStatus(`✅ Successfully generated ${count} posts!\n\nGo back to Dashboard and click "Refresh Dashboard" to see new pending posts.`, "success");
                
                // Optional: You can call your ai_generator.py via GitHub API in future here
                console.log("Prompt sent:", prompt);
                console.log("Count:", count);
                console.log("Platforms:", platforms);
            }, 1500);
        }

        function refreshPage() {
            location.reload();
        }

        // Allow pressing Enter in textarea to generate
        document.getElementById("promptInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                generatePosts();
            }
        });
    </script>
</body>
</html>
