<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Control Room | I-Flex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            margin-bottom: 30px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-5px);
        }
        
        /* Main Card */
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        
        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .checkbox-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
        }
        
        .checkbox-group input {
            width: auto;
        }
        
        /* Status */
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            display: none;
        }
        
        .status-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }
        
        .status-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }
        
        .status-info {
            background: #e0e7ff;
            color: #3730a3;
            border-left: 4px solid #6366f1;
        }
        
        .status-loading {
            background: #fef3c7;
            color: #92400e;
            border-left: 4px solid #f59e0b;
        }
        
        /* Divider */
        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
        }
        
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #9ca3af;
            font-size: 14px;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .quick-btn {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .quick-btn:hover {
            border-color: #667eea;
            background: #f5f3ff;
        }
        
        /* Token Section */
        .token-section {
            background: #f9fafb;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .token-input-group {
            display: flex;
            gap: 10px;
        }
        
        .token-input-group input {
            flex: 1;
            font-family: monospace;
            font-size: 12px;
        }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f9fafb;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }
        
        .result-box {
            margin-top: 20px;
            padding: 16px;
            background: #f0fdf4;
            border-radius: 12px;
            display: none;
        }
        
        .result-box a {
            color: #10b981;
            margin-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Back Button -->
        <a href="dashboard.html" class="back-btn">
            ← Back to Dashboard
        </a>
        
        <!-- Main Card -->
        <div class="card">
            <h1>🤖 AI Content Factory</h1>
            <p class="subtitle">Generate posts with AI — click, wait, approve, done.</p>
            
            <!-- Stats -->
            <div class="stats" id="stats" style="display: none;">
                <div class="stat-card">
                    <div class="stat-number" id="statPending">0</div>
                    <div class="stat-label">Pending Posts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statApproved">0</div>
                    <div class="stat-label">Approved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="stat-label">Total Posts</div>
                </div>
            </div>
            
            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="quick-btn" onclick="quickGenerate('fitness motivation')">💪 Fitness Motivation</button>
                <button class="quick-btn" onclick="quickGenerate('weight loss')">⚖️ Weight Loss</button>
                <button class="quick-btn" onclick="quickGenerate('nutrition tips')">🥗 Nutrition Tips</button>
                <button class="quick-btn" onclick="quickGenerate('workout routines')">🏋️ Workout Routines</button>
            </div>
            
            <div class="divider"><span>OR</span></div>
            
            <!-- Custom Form -->
            <div class="form-group">
                <label>📝 Theme / Topic</label>
                <input type="text" id="themeInput" placeholder="e.g., weight loss motivation, fitness equipment, client success stories">
            </div>
            
            <div class="form-group">
                <label>🔢 Number of Posts</label>
                <select id="countInput">
                    <option value="3">3 posts</option>
                    <option value="5">5 posts</option>
                    <option value="10">10 posts</option>
                    <option value="14" selected>14 posts (full week)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📱 Platforms</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" value="facebook" checked> Facebook</label>
                    <label><input type="checkbox" value="instagram" checked> Instagram</label>
                    <label><input type="checkbox" value="line"> Line</label>
                </div>
            </div>
            
            <!-- GitHub Token -->
            <div class="token-section" id="tokenSection">
                <label>🔐 GitHub Token (one-time setup)</label>
                <div class="token-input-group">
                    <input type="password" id="githubTokenInput" placeholder="ghp_xxxxxxxxxxxx">
                    <button class="btn-secondary" onclick="saveToken()">Save Token</button>
                </div>
                <small style="color: #6b7280; display: block; margin-top: 8px;">
                    <a href="https://github.com/settings/tokens" target="_blank" style="color: #667eea;">Get token</a> 
                    (need "repo" permission). Stored only in your browser.
                </small>
            </div>
            
            <!-- Generate Button -->
            <button id="generateBtn" class="btn-primary" onclick="generateContent()">
                ✨ Generate Content
            </button>
            
            <!-- Status Message -->
            <div id="statusMessage" class="status"></div>
            
            <!-- Result Box -->
            <div id="resultBox" class="result-box">
                <strong>✅ Content Generated!</strong><br>
                <span id="resultText"></span><br>
                <a href="dashboard.html">→ Go to Dashboard to review & approve</a>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const REPO_OWNER = 'Csmittee';
        const REPO_NAME = 'social-injector';
        const BRANCH = 'main';
        
        let githubToken = localStorage.getItem('githubToken') || '';
        
        if (githubToken) {
            document.getElementById('githubTokenInput').value = '••••••••••••••••';
        }
        
        function saveToken() {
            const token = document.getElementById('githubTokenInput').value;
            if (token && token !== '••••••••••••••••') {
                localStorage.setItem('githubToken', token);
                githubToken = token;
                showStatus('✅ Token saved! You can now generate content.', 'success');
                document.getElementById('githubTokenInput').value = '••••••••••••••••';
            } else if (githubToken) {
                showStatus('Token already saved. Click Generate to continue.', 'info');
            } else {
                showStatus('Please enter a valid GitHub token', 'error');
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status status-${type}`;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                if (type === 'success') {
                    statusDiv.style.display = 'none';
                }
            }, 5000);
        }
        
        async function triggerGitHubAction(theme, count, platforms) {
            if (!githubToken && !localStorage.getItem('githubToken')) {
                showStatus('❌ Please save your GitHub token first', 'error');
                return false;
            }
            
            githubToken = localStorage.getItem('githubToken');
            
            showStatus('⏳ Starting content generation... This takes 2-3 minutes. Check back soon!', 'loading');
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ Generating... Please wait';
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/content-factory.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: BRANCH,
                        inputs: {
                            theme: theme,
                            count: count.toString(),
                            platforms: platforms.join(',')
                        }
                    })
                });
                
                if (response.ok) {
                    showStatus(`✨ Success! Generating ${count} posts about "${theme}". Refresh in 2-3 minutes.`, 'success');
                    
                    document.getElementById('resultBox').style.display = 'block';
                    document.getElementById('resultText').innerHTML = `Generated ${count} posts about "${theme}".<br>They will appear in your dashboard shortly.`;
                    
                    document.getElementById('stats').style.display = 'grid';
                    
                    return true;
                } else {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to trigger action');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus(`❌ Failed: ${error.message}`, 'error');
                return false;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✨ Generate Content';
            }
        }
        
        async function generateContent() {
            if (!localStorage.getItem('githubToken')) {
                showStatus('Please save your GitHub token first', 'error');
                return;
            }
            
            const theme = document.getElementById('themeInput').value;
            const count = document.getElementById('countInput').value;
            
            const platforms = [];
            document.querySelectorAll('.checkbox-group input[type="checkbox"]:checked').forEach(cb => {
                platforms.push(cb.value);
            });
            
            if (!theme) {
                showStatus('Please enter a theme/topic', 'error');
                return;
            }
            
            await triggerGitHubAction(theme, count, platforms);
        }
        
        async function quickGenerate(theme) {
            document.getElementById('themeInput').value = theme;
            await generateContent();
        }
        
        async function loadStats() {
            try {
                const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/social/posts.csv`;
                const response = await fetch(url + '?t=' + Date.now());
                const text = await response.text();
                
                const lines = text.trim().split('\n');
                const total = lines.length - 1;
                
                let pending = 0, approved = 0;
                for (let i = 1; i < lines.length; i++) {
                    if (lines[i].includes('pending')) pending++;
                    if (lines[i].includes('approved')) approved++;
                }
                
                document.getElementById('statPending').textContent = pending;
                document.getElementById('statApproved').textContent = approved;
                document.getElementById('statTotal').textContent = total;
                document.getElementById('stats').style.display = 'grid';
            } catch (e) {
                console.log('Stats not available yet');
            }
        }
        
        loadStats();
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
