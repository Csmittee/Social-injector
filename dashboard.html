<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Dashboard | I-Flex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
        }
        h1 { margin: 0; color: #1a1a1a; }
        .subtitle { color: #666; margin-bottom: 2rem; }
        
        .ai-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #ddd;
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 8px;
        }
        .tab.active {
            background: #FFD700;
            font-weight: 600;
        }
        
        .view-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            justify-content: flex-end;
        }
        .view-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .view-btn.active {
            background: #FFD700;
            border-color: #FFD700;
        }
        
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 1.5rem;
        }
        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .post-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .summary-item {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .post-meta-bar {
            background: #f8f8f8;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .platform-badge {
            background: #e0e0e0;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .status {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-posted { background: #e0e0e0; color: #444; }
        
        .post-actions {
            padding: 1rem;
            display: flex;
            gap: 0.75rem;
            border-top: 1px solid #eee;
        }
        button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-approve { background: #10b981; color: white; }
        .btn-reject { background: #ef4444; color: white; }
        .btn-scheduled { background: #6b7280; color: white; cursor: default; }
        
        .message {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
            display: none;
        }
        .message-success { background: #d4edda; color: #155724; }
        .message-error { background: #f8d7da; color: #721c24; }
        .message-info { background: #d1ecf1; color: #0c5460; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        .link-url {
            font-size: 11px;
            color: #3b82f6;
            word-break: break-all;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-row">
        <div style="display: flex; align-items: center; gap: 15px;">
            <h1>📱 Social Media Dashboard | I-Flex Thailand</h1>
            <div class="live-indicator">
                <span class="live-dot"></span>
                LIVE
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="refresh-btn" onclick="manualRefresh()">🔄 Refresh</button>
            <a href="ai-control.html" class="ai-button">🤖 AI Factory</a>
        </div>
    </div>
    <p class="subtitle">Review, approve, and schedule posts for Facebook, Instagram, and Line</p>
    
    <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-number" id="statPending">0</div><div>Pending</div></div>
        <div class="stat-card"><div class="stat-number" id="statApproved">0</div><div>Approved</div></div>
        <div class="stat-card"><div class="stat-number" id="statPosted">0</div><div>Posted</div></div>
        <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div>Total</div></div>
    </div>
    
    <div class="tabs">
        <div class="tab active" data-status="pending">⏳ Pending Approval</div>
        <div class="tab" data-status="approved">✅ Approved</div>
        <div class="tab" data-status="posted">📌 Posted</div>
        <div class="tab" data-status="rejected">❌ Rejected</div>
    </div>
    
    <div class="view-toggle">
        <button id="view-cards" class="view-btn active">📱 Card View</button>
        <button id="view-summary" class="view-btn">📋 Summary View</button>
    </div>

    <div id="message" class="message"></div>
    <div id="posts-container">
        <div style="text-align: center; padding: 2rem;">Loading posts...</div>
    </div>
</div>

<script>
    // CONFIGURATION
    const REPO_OWNER = 'Csmittee';
    const REPO_NAME = 'social-injector';
    const FILE_PATH = 'social/posts.csv';
    const BRANCH = 'main';
    
    let githubToken = localStorage.getItem('githubToken') || '';
    let allPosts = [];
    let currentStatus = 'pending';
    let currentView = 'cards';
    let autoRefreshTimer = null;
    
    // Password
    const PASSWORD = 'iflex2025';
    if (!localStorage.getItem('auth')) {
        const entered = prompt('Enter dashboard password:');
        if (entered !== PASSWORD) {
            document.body.innerHTML = '<div style="text-align:center; padding:4rem;">🔒 Access denied</div>';
            throw new Error('Access denied');
        }
        localStorage.setItem('auth', 'true');
    }
    
    function showMessage(msg, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = msg;
        msgDiv.className = `message message-${type}`;
        msgDiv.style.display = 'block';
        setTimeout(() => {
            msgDiv.style.display = 'none';
        }, 3000);
    }
    
    function parseCSV(text) {
        const lines = text.trim().split('\n');
        if (lines.length < 2) return [];
        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        const posts = [];
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const values = [];
            let current = '';
            let inQuotes = false;
            for (let char of lines[i]) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    values.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current);
            const post = {};
            headers.forEach((header, idx) => {
                post[header] = values[idx] ? values[idx].replace(/^"|"$/g, '').trim() : '';
            });
            posts.push(post);
        }
        return posts;
    }
    
    function updateStats() {
        const pending = allPosts.filter(p => p.status === 'pending').length;
        const approved = allPosts.filter(p => p.status === 'approved').length;
        const posted = allPosts.filter(p => p.status === 'posted').length;
        document.getElementById('statPending').textContent = pending;
        document.getElementById('statApproved').textContent = approved;
        document.getElementById('statPosted').textContent = posted;
        document.getElementById('statTotal').textContent = allPosts.length;
    }
    
    function renderPosts() {
        const filtered = allPosts.filter(p => p.status === currentStatus);
        const container = document.getElementById('posts-container');
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">No posts in this status</div>';
            return;
        }
        if (currentView === 'cards') {
            container.innerHTML = `<div class="posts-grid">${filtered.map((post, idx) => {
                const globalIdx = allPosts.findIndex(p => p.title === post.title && p.post_date === post.post_date);
                return `
                <div class="post-card">
                    <div class="post-meta-bar">
                        <span class="platform-badge">${post.platform || 'Unknown'}</span>
                        <span>📅 ${post.post_date || 'No date'}</span>
                        <span class="status status-${post.status}">${post.status}</span>
                    </div>
                    <div style="padding:1rem;">
                        <strong>${post.title || 'Untitled'}</strong>
                        <p style="margin-top:10px; color:#666;">${(post.caption || '').substring(0, 200)}${(post.caption || '').length > 200 ? '...' : ''}</p>
                        ${post.link ? `<div class="link-url">🔗 ${post.link}</div>` : ''}
                    </div>
                    <div class="post-actions">
                        ${post.status === 'pending' ? `
                            <button class="btn-approve" onclick="updateStatus('${escapeHtml(post.title)}', '${escapeHtml(post.post_date)}', 'approved')">✅ Approve</button>
                            <button class="btn-reject" onclick="updateStatus('${escapeHtml(post.title)}', '${escapeHtml(post.post_date)}', 'rejected')">❌ Reject</button>
                        ` : ''}
                        ${post.status === 'approved' ? `<button class="btn-scheduled">⏰ Scheduled for ${post.post_date}</button>` : ''}
                        ${post.status === 'posted' ? `<button class="btn-scheduled">✅ Posted</button>` : ''}
                    </div>
                </div>`;
            }).join('')}</div>`;
        } else {
            container.innerHTML = `<div class="posts-list">${filtered.map(post => `
                <div class="summary-item">
                    <div><span class="platform-badge">${post.platform}</span> 📅 ${post.post_date}</div>
                    <div style="flex:1; margin:0 1rem;">${(post.title || '').substring(0, 50)}</div>
                    <div class="status status-${post.status}">${post.status}</div>
                    <div>
                        ${post.status === 'pending' ? `
                            <button class="btn-approve" onclick="updateStatus('${escapeHtml(post.title)}', '${escapeHtml(post.post_date)}', 'approved')">Approve</button>
                            <button class="btn-reject" onclick="updateStatus('${escapeHtml(post.title)}', '${escapeHtml(post.post_date)}', 'rejected')">Reject</button>
                        ` : ''}
                    </div>
                </div>
            `).join('')}</div>`;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
    
    async function loadPosts() {
        try {
            const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${FILE_PATH}?t=${Date.now()}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const csvText = await response.text();
            const newPosts = parseCSV(csvText);
            const oldCount = allPosts.length;
            allPosts = newPosts;
            updateStats();
            renderPosts();
            if (newPosts.length > oldCount) {
                showMessage(`✨ ${newPosts.length - oldCount} new posts added!`, 'success');
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('posts-container').innerHTML = `<div style="text-align:center; padding:2rem; color:red;">❌ Failed to load posts</div>`;
        }
    }
    
    async function updateStatus(title, postDate, newStatus) {
        if (!githubToken) {
            githubToken = prompt('Enter your GitHub token (get from https://github.com/settings/tokens, need "repo" scope):');
            if (!githubToken) return;
            localStorage.setItem('githubToken', githubToken);
        }
        
        const postIndex = allPosts.findIndex(p => p.title === title && p.post_date === postDate);
        if (postIndex === -1) return;
        
        const originalStatus = allPosts[postIndex].status;
        allPosts[postIndex].status = newStatus;
        renderPosts();
        updateStats();
        
        try {
            const fileUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            const shaRes = await fetch(fileUrl, { headers: { 'Authorization': `token ${githubToken}` } });
            const shaData = await shaRes.json();
            const sha = shaData.sha;
            
            let csvContent = 'title,post_date,platform,caption,image_urls,link,status\n';
            allPosts.forEach(p => {
                const t = (p.title || '').replace(/"/g, '""');
                const c = (p.caption || '').replace(/"/g, '""');
                csvContent += `"${t}",${p.post_date},"${p.platform}","${c}","${p.image_urls || ''}","${p.link || ''}",${p.status}\n`;
            });
            
            const contentBase64 = btoa(unescape(encodeURIComponent(csvContent)));
            const response = await fetch(fileUrl, {
                method: 'PUT',
                headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Update: ${title} → ${newStatus}`, content: contentBase64, sha: sha, branch: BRANCH })
            });
            
            if (response.ok) {
                showMessage(`✅ Updated to "${newStatus}"`, 'success');
                await loadPosts();
            } else {
                throw new Error('Update failed');
            }
        } catch (error) {
            showMessage(`❌ Failed: ${error.message}`, 'error');
            allPosts[postIndex].status = originalStatus;
            renderPosts();
            updateStats();
        }
    }
    
    function manualRefresh() {
        showMessage('🔄 Refreshing...', 'info');
        loadPosts();
    }
    
    // Auto refresh every 15 seconds
    function startAutoRefresh() {
        loadPosts();
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(loadPosts, 15000);
    }
    
    // Tab click handlers
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentStatus = tab.dataset.status;
            renderPosts();
        });
    });
    
    document.getElementById('view-cards').addEventListener('click', () => {
        currentView = 'cards';
        document.getElementById('view-cards').classList.add('active');
        document.getElementById('view-summary').classList.remove('active');
        renderPosts();
    });
    
    document.getElementById('view-summary').addEventListener('click', () => {
        currentView = 'summary';
        document.getElementById('view-summary').classList.add('active');
        document.getElementById('view-cards').classList.remove('active');
        renderPosts();
    });
    
    // Start
    startAutoRefresh();
</script>
</body>
</html>
