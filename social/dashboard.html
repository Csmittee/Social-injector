<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Dashboard | I-Flex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { margin-bottom: 0.5rem; }
        .subtitle { color: #666; margin-bottom: 2rem; }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
        }
        .login-box input {
            padding: 0.75rem;
            margin: 1rem 0;
            width: 200px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .login-box button {
            background: #FFD700;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #ddd;
            padding-bottom: 0.5rem;
        }
        .tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 8px;
        }
        .tab.active {
            background: #FFD700;
            font-weight: 600;
        }
        
        .post-card {
            background: white;
            border-radius: 16px;
            margin-bottom: 1rem;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .post-preview {
            flex: 2;
            min-width: 250px;
        }
        .post-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 0.5rem;
        }
        .post-meta {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.5rem;
        }
        .platform-badge {
            display: inline-block;
            background: #e0e0e0;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-right: 0.5rem;
        }
        .post-actions {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            justify-content: center;
        }
        button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-approve {
            background: #10b981;
            color: white;
        }
        .btn-reject {
            background: #ef4444;
            color: white;
        }
        .btn-edit {
            background: #f59e0b;
            color: white;
        }
        .status {
            font-size: 0.8rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-posted { background: #e0e0e0; color: #444; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        
        @media (max-width: 768px) {
            .post-card { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📱 Social Media Dashboard</h1>
    <p class="subtitle">Review, approve, and schedule posts for Facebook, Instagram, and Line</p>
    
    <div class="tabs">
        <div class="tab active" data-status="pending">⏳ Pending Approval</div>
        <div class="tab" data-status="approved">✅ Approved</div>
        <div class="tab" data-status="posted">📌 Posted</div>
        <div class="tab" data-status="rejected">❌ Rejected</div>
    </div>
    
    <div id="posts-container">
        <div style="text-align: center; padding: 2rem;">Loading posts...</div>
    </div>
</div>

<script>
    // Simple password protection
    const PASSWORD = 'iflex2025'; // Change this!
    
    function checkAuth() {
        if (localStorage.getItem('auth') === 'true') return true;
        
        const pwd = prompt('Enter dashboard password:');
        if (pwd === PASSWORD) {
            localStorage.setItem('auth', 'true');
            return true;
        }
        return false;
    }
    
    if (!checkAuth()) {
        document.body.innerHTML = '<div style="text-align:center; padding:4rem;">🔒 Access denied</div>';
        throw new Error('Access denied');
    }
    
    let allPosts = [];
    let currentStatus = 'pending';
    
    // GitHub API to read/write CSV (via your repo)
    const REPO = 'your-username/your-repo';
    const BRANCH = 'main';
    const CSV_PATH = 'social/posts.csv';
    const GITHUB_TOKEN = ''; // You'll need a personal access token
    
    async function fetchPosts() {
        const url = `https://api.github.com/repos/${REPO}/contents/${CSV_PATH}?ref=${BRANCH}`;
        const response = await fetch(url, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        const data = await response.json();
        const content = atob(data.content);
        
        // Parse CSV
        const lines = content.split('\n');
        const headers = lines[0].split(',');
        const posts = [];
        
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const values = lines[i].split(',');
            const post = {};
            headers.forEach((h, idx) => post[h.trim()] = values[idx]?.trim() || '');
            posts.push(post);
        }
        
        allPosts = posts;
        renderPosts();
    }
    
    async function updatePostStatus(index, newStatus) {
        // This would need to update the CSV via GitHub API
        // For now, we'll simulate and give you instructions
        console.log(`Update post ${index} to ${newStatus}`);
        alert(`In production, this would update the CSV. You'll need to implement GitHub API write.`);
    }
    
    function renderPosts() {
        const filtered = allPosts.filter(p => p.status === currentStatus);
        const container = document.getElementById('posts-container');
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">No posts found</div>';
            return;
        }
        
        container.innerHTML = filtered.map((post, idx) => `
            <div class="post-card">
                <div class="post-preview">
                    <div class="post-meta">
                        <span class="platform-badge">${post.platform}</span>
                        📅 ${post.datetime}
                        <span class="status status-${post.status}">${post.status}</span>
                    </div>
                    <div class="post-content">${post.content}</div>
                    ${post.image_url ? `<img src="${post.image_url}" alt="Preview">` : ''}
                    ${post.link ? `<div style="margin-top:0.5rem;"><a href="${post.link}" target="_blank">🔗 ${post.link}</a></div>` : ''}
                </div>
                <div class="post-actions">
                    ${post.status === 'pending' ? `
                        <button class="btn-approve" onclick="updatePostStatus(${idx}, 'approved')">✅ Approve</button>
                        <button class="btn-edit" onclick="alert('Edit feature coming soon')">✏️ Edit</button>
                        <button class="btn-reject" onclick="updatePostStatus(${idx}, 'rejected')">❌ Reject</button>
                    ` : ''}
                    ${post.status === 'approved' ? `
                        <button class="btn-edit" onclick="alert('Will post at scheduled time')">⏰ Scheduled</button>
                        <button class="btn-reject" onclick="updatePostStatus(${idx}, 'rejected')">❌ Cancel</button>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentStatus = tab.dataset.status;
            renderPosts();
        });
    });
    
    fetchPosts();
</script>
</body>
</html>
